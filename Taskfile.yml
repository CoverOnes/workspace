version: '3'

vars:
  MODULE: github.com/CoverOnes/workspace
  BUILD_DIR: ./build

tasks:
  default:
    desc: "Run the full check suite"
    deps: [check]

  check:
    desc: "Run lint + vet + test + build (CI gate)"
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test
      - task: build

  fmt:
    desc: "Check gofmt formatting"
    cmds:
      - |
        UNFORMATTED=$(gofmt -l .)
        if [ -n "$UNFORMATTED" ]; then
          echo "Unformatted files:"
          echo "$UNFORMATTED"
          exit 1
        fi

  vet:
    desc: "Run go vet"
    cmds:
      - go vet ./...

  lint:
    desc: "Run golangci-lint (required; fails if not installed — CI installs it via curl)"
    cmds:
      - |
        if ! command -v golangci-lint &>/dev/null; then
          echo "ERROR: golangci-lint not found. Install via: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin" >&2
          exit 1
        fi
        golangci-lint run ./...

  test:
    desc: "Run all tests (integration tests require Docker)"
    cmds:
      - go test -p 2 -timeout 120s ./...

  test-unit:
    desc: "Run unit tests only (no Docker required)"
    cmds:
      - go test -short -timeout 60s ./...

  test-integration:
    desc: "Run integration tests (requires Docker)"
    cmds:
      - go test -run Integration -timeout 120s ./...

  build:
    desc: "Build the server binary"
    cmds:
      - go build -o {{.BUILD_DIR}}/server ./cmd/server

  run:
    desc: "Run the server locally (requires .env or env vars)"
    cmds:
      - go run ./cmd/server

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -rf {{.BUILD_DIR}}

  tidy:
    desc: "Run go mod tidy"
    cmds:
      - go mod tidy

  migrate:
    desc: "Apply all pending migrations via golang-migrate CLI (requires 'migrate' in PATH and WORKSPACE_POSTGRES_DSN env var)"
    cmds:
      - |
        if ! command -v migrate &>/dev/null; then
          echo "ERROR: 'migrate' CLI not found." >&2
          echo "Install: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest" >&2
          exit 1
        fi
        if [ -z "$WORKSPACE_POSTGRES_DSN" ]; then
          echo "ERROR: WORKSPACE_POSTGRES_DSN is not set" >&2
          exit 1
        fi
        migrate -path ./migrations -database "$WORKSPACE_POSTGRES_DSN" up

  migrate-down:
    desc: "Roll back the last migration (requires 'migrate' in PATH and WORKSPACE_POSTGRES_DSN env var)"
    cmds:
      - |
        if ! command -v migrate &>/dev/null; then
          echo "ERROR: 'migrate' CLI not found." >&2
          exit 1
        fi
        if [ -z "$WORKSPACE_POSTGRES_DSN" ]; then
          echo "ERROR: WORKSPACE_POSTGRES_DSN is not set" >&2
          exit 1
        fi
        migrate -path ./migrations -database "$WORKSPACE_POSTGRES_DSN" down 1
